apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: ride-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
      - name: ride-service
        image: pratikgajbar/ride-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8084
        envFrom:
        - secretRef:
            name: postgres-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ride-service
  namespace: ride-platform
spec:
  selector:
    app: ride-service
  ports:
  - port: 8084
    targetPort: 8084
