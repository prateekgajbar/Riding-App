apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ride-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: pratikgajbar/notification-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8087
        envFrom:
        - secretRef:
            name: postgres-secret
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ride-platform
spec:
  selector:
    app: notification-service
  ports:
  - port: 8087
    targetPort: 8087
